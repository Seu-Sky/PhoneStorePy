{% load humanize %}
{% for p in products %}
<div class="col-6 col-md-4 col-lg-3 col-xl-2">
    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden product-hover" style="transition: 0.3s;">
        <div class="position-relative">
            <img src="{{ p.image.url }}" class="card-img-top p-3" style="height: 180px; object-fit: contain;">
        </div>
        <div class="card-body d-flex flex-column text-center p-2">
            <h6 class="fw-bold text-dark text-truncate mb-2">{{ p.name }}</h6>
            <p class="text-danger fw-bold mb-3 small">{{ p.price|intcomma }} VND</p>
            
            <div class="mt-auto d-flex gap-2">
                <a href="{% url 'product_detail' p.id %}" class="btn btn-primary w-50 rounded-pill d-flex justify-content-center align-items-center" style="font-size: 0.75rem; padding: 0.35rem 0;">
                    Chi tiết
                </a>
                
                <a href="{% url 'add_to_cart' p.id %}?action=checkout" class="btn btn-danger w-50 rounded-pill shadow-sm d-flex justify-content-center align-items-center fw-bold" style="font-size: 0.75rem; padding: 0.35rem 0;">
                    Mua ngay
                </a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center py-5">
    <p class="text-muted">Không tìm thấy sản phẩm nào.</p>
</div>
{% endfor %}
