{% extends 'products/base.html' %}
{% load humanize %}

{% block content %}
<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold"><i class="bi bi-box-seam text-primary me-2"></i>Quản lý kho hàng</h3>
        <a href="{% url 'add_product' %}" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
            <i class="bi bi-plus-lg me-2"></i>Thêm sản phẩm
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-secondary small text-uppercase">
                    <tr>
                        <th class="ps-4 py-3">Sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá tiền</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in products %}
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center gap-3">
                                <img src="{{ p.image.url }}" class="rounded-3 shadow-sm" style="width: 50px; height: 50px; object-fit: contain;">
                                <div class="fw-bold text-dark">{{ p.name }}</div>
                            </div>
                        </td>
                        <td><span class="badge bg-light text-primary border border-primary-subtle rounded-pill">{{ p.category.name }}</span></td>
                        <td class="fw-bold text-danger">{{ p.price|intcomma }} đ</td>
                        <td class="text-center">
                            <div class="btn-group gap-2">
                                <a href="{% url 'edit_product' p.pk %}" class="btn btn-sm btn-outline-primary rounded-circle p-2 shadow-sm" title="Sửa">
                                    <i class="bi bi-pencil-square px-1"></i>
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-danger rounded-circle p-2 shadow-sm btn-delete-product" data-url="{% url 'delete_product' p.pk %}" title="Xóa">
                                    <i class="bi bi-trash3 px-1"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    document.querySelectorAll('.btn-delete-product').forEach(btn => {
        btn.onclick = function() {
            const url = this.getAttribute('data-url');
            Swal.fire({
                title: 'Xóa sản phẩm này?',
                text: "Sản phẩm sẽ biến mất khỏi cửa hàng ngay lập tức!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Đồng ý xóa',
                cancelButtonText: 'Hủy'
            }).then((result) => { if (result.isConfirmed) window.location.href = url; });
        };
    });
</script>
{% endblock %}
{% endblock %}
